<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AquaSync Ecosystem</title>

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#00f2fe" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script> 
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              aqua: "#00f2fe",
              deepbg: "rgba(18, 18, 18, <alpha-value>)",
              cardbg: "rgba(30, 30, 30, <alpha-value>)",
            },
          },
        },
      };
    </script>

    <style>
      body { transition: background-color 0.4s ease, color 0.4s ease; }
      ::-webkit-scrollbar { display: none; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; display: block; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 10px; }
    </style>
  </head>

  <body class="bg-[#121212] text-gray-200 font-sans pb-24 select-none">
    
    <div class="fixed top-0 left-0 right-0 z-[200] w-full flex justify-center px-4 pt-4 pointer-events-none">
      <header class="pointer-events-auto w-full max-w-[1200px] bg-cardbg/70 backdrop-blur-xl border border-gray-700/50 shadow-[0_10px_40px_rgba(0,0,0,0.5)] rounded-2xl px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-gradient-to-br from-aqua to-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(0,242,254,0.4)]">
            <span class="text-xl">🌊</span>
          </div>
          <div class="flex flex-col justify-center">
            <h1 class="text-white font-black tracking-widest uppercase text-sm leading-tight">AquaSync</h1>
            <span id="ui-active-model" class="text-[9px] text-aqua font-bold tracking-widest uppercase">AS-Standard</span>
          </div>
        </div>

        <div class="flex items-center space-x-2">
          <button id="ui-connection-status" class="w-10 h-10 bg-[#121212] border border-gray-700 rounded-full flex items-center justify-center text-gray-400 hover:text-white transition-all active:scale-95 group">
            <span class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gray-500 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-gray-500"></span>
            </span>
          </button>
        </div>
      </header>
    </div>
    <div id="slot-global-overlays" class="fixed inset-0 z-[300] hidden flex-col items-center justify-center bg-deepbg px-6"></div>
    <main class="p-5 pt-24 max-w-[1200px] mx-auto">
      
      <section id="page-insights" class="block space-y-6">
        <h1 class="text-2xl font-bold text-white tracking-wide">Tank Insights</h1>
        <div id="slot-today-overview"></div>
        <div id="slot-analytics-charts" class="space-y-6"></div>
      </section>

      <section id="page-control" class="hidden animate-fade-in space-y-6">
        <h1 class="text-2xl font-bold text-white tracking-wide">Hardware Control</h1>
        <div id="slot-primary-control-card"></div>
        <div id="slot-schedules-stack"></div>
      </section>

      <section id="page-color" class="hidden space-y-6">
        <h1 class="text-2xl font-bold text-white tracking-wide">Color Spectrum</h1>
        <div id="slot-color-preview"></div>
        <div id="slot-color-presets"></div>
        <div id="slot-color-manual-mix"></div>
      </section>

      <section id="page-network" class="hidden space-y-6">
        <h1 class="text-2xl font-bold text-white tracking-wide">Connection Manager</h1>
        <div id="slot-network-manager-cards" class="space-y-6"></div>
      </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[100] w-full flex justify-center px-4 pb-3 pointer-events-none">
      <nav class="pointer-events-auto w-full max-w-[450px] bg-cardbg/70 backdrop-blur-xl border border-gray-700/50 shadow-[0_10px_40px_rgba(0,0,0,0.5)] rounded-full px-2 py-2 flex justify-between items-center">
        <button id="nav-page-insights" onclick="AquaSync.switchTab('page-insights')" class="flex-1 flex flex-col items-center py-2 rounded-full text-aqua transition-all active:scale-95">
          <span class="text-xl mb-0.5">📊</span>
          <span class="text-[9px] uppercase tracking-wider font-bold">Insights</span>
        </button>
        <button id="nav-page-control" onclick="AquaSync.switchTab('page-control')" class="flex-1 flex flex-col items-center py-2 rounded-full text-gray-500 transition-all active:scale-95">
          <span class="text-xl mb-0.5">🎚️</span>
          <span class="text-[9px] uppercase tracking-wider font-bold">Control</span>
        </button>
        <button id="nav-page-color" onclick="AquaSync.switchTab('page-color')" class="flex-1 flex flex-col items-center py-2 rounded-full text-gray-500 transition-all active:scale-95">
          <span class="text-xl mb-0.5">🎨</span>
          <span class="text-[9px] uppercase tracking-wider font-bold">Color</span>
        </button>
        <button id="nav-page-network" onclick="AquaSync.switchTab('page-network')" class="flex-1 flex flex-col items-center py-2 rounded-full text-gray-500 transition-all active:scale-95">
          <span class="text-xl mb-0.5">🛜</span>
          <span class="text-[9px] uppercase tracking-wider font-bold">Network</span>
        </button>
      </nav>
    </div>

    <template id="tpl-insights-overview">
      <div class="bg-cardbg bg-opacity-80 backdrop-blur-md rounded-2xl p-5 shadow-lg border border-gray-800">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-sm uppercase text-gray-400 font-semibold tracking-wide">Today's Overview</h2>
          <div class="h-2.5 w-2.5 rounded-full bg-aqua shadow-[0_0_8px_#00f2fe]"></div>
        </div>
        <div class="grid grid-cols-2 gap-y-4 gap-x-4 pb-4 border-b border-gray-800/60 metrics-grid">
          <div>
            <p class="text-[10px] text-gray-500 uppercase tracking-wider">Light Status</p>
            <p class="text-xl font-black text-green-400 tracking-wide tpl-light-status">--</p>
          </div>
          <div class="text-right">
            <p class="text-[10px] text-gray-500 uppercase tracking-wider">CO2 Status</p>
            <p class="text-xl font-black text-green-400 tracking-wide tpl-co2-status">--</p>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-y-4 gap-x-4 pt-4 text-xs font-medium text-gray-300 schedule-meta-grid">
          <div>
            <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-0.5">Sunrise Commenced</p>
            <span class="tpl-sunrise-val text-sm">--</span>
          </div>
          <div class="text-right">
            <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-0.5">Estimated Sunset</p>
            <span class="tpl-sunset-val text-sm">--</span>
          </div>
          <div class="pt-2 border-t border-gray-800/40">
            <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-0.5">Target Photoperiod</p>
            <span class="text-sm font-bold text-white tpl-photo-val">--</span>
          </div>
          <div class="text-right pt-2 border-t border-gray-800/40">
            <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-0.5">Recovery Ramp</p>
            <span class="text-sm font-bold text-red-400 tpl-recovery-val">--</span>
          </div>
        </div>
      </div>
    </template>

    <template id="tpl-analytics-chart-card">
      <div class="bg-cardbg rounded-2xl p-5 shadow-lg border border-gray-800">
        <h2 class="text-sm uppercase text-gray-400 font-semibold tracking-wide mb-4 tpl-chart-title">Activity Graph</h2>
        <div class="grid grid-cols-2 gap-4 mb-4 pb-4 border-b border-gray-800/60 text-xs">
          <div>
            <p class="text-[10px] text-gray-500 uppercase tracking-wider">Total Active</p>
            <p class="text-lg font-bold text-white tpl-active-time">--</p>
          </div>
          <div class="text-right">
            <p class="text-[10px] text-gray-500 uppercase tracking-wider">Load Shedding</p>
            <p class="text-lg font-bold text-red-500 tpl-shedding-time">--</p>
          </div>
        </div>
        <div class="relative w-full h-40">
          <canvas class="tpl-chart-canvas"></canvas>
        </div>
      </div>
    </template>

    <template id="tpl-mode-banner">
      <div class="bg-cardbg rounded-2xl p-4 border border-gray-800 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
          <span class="text-2xl tpl-mode-icon">🤖</span>
          <div>
            <h2 class="text-sm font-bold text-aqua tracking-wide tpl-mode-title">Auto Mode</h2>
            <p class="text-[10px] text-gray-500 uppercase tracking-wider mt-0.5 tpl-mode-desc">Following Schedule</p>
          </div>
        </div>
        <button class="bg-[#121212] text-gray-400 border border-gray-700 hover:text-white px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition-all active:scale-95 tpl-mode-btn">
          Set Manual
        </button>
      </div>
    </template>

    <template id="tpl-quick-override-box">
      <button class="bg-cardbg border-2 border-gray-800 rounded-2xl p-4 flex flex-col items-center justify-center transition-all active:scale-95 shadow-md group">
        <span class="text-2xl mb-1 tpl-box-icon">💡</span>
        <span class="text-[10px] uppercase tracking-wider font-bold text-gray-500 tracking-widest tpl-box-label">Light: OFF</span>
      </button>
    </template>

    <template id="tpl-schedule-config-card">
      <div class="bg-cardbg rounded-2xl p-5 shadow-lg border border-gray-800 space-y-4">
        <div class="flex justify-between items-center border-b border-gray-800/60 pb-3 header-row">
          <h2 class="text-sm uppercase text-gray-400 font-semibold flex items-center"><span class="text-lg mr-2 tpl-card-icon">☀️</span> <span class="tpl-card-title">Primary Lighting</span></h2>
          <div class="tpl-toggle-container hidden">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer tpl-card-toggle" />
              <div class="w-11 h-6 bg-gray-700 rounded-full peer peer-checked:bg-aqua peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
            </label>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4 tpl-body-content">
          <div class="time-container">
            <label class="block text-[10px] text-gray-500 uppercase tracking-wider mb-2">Start Time</label>
            <input type="time" class="w-full bg-[#121212] border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-aqua text-sm font-medium tpl-time-input" />
          </div>
          <div class="stepper-container">
            <label class="block text-[10px] text-gray-500 uppercase tracking-wider mb-2 tpl-stepper-label">Photoperiod</label>
            <div class="flex items-center justify-between bg-[#121212] border border-gray-700 rounded-lg px-1 py-1">
              <button class="w-8 h-8 flex items-center justify-center bg-cardbg rounded-md text-gray-400 hover:text-white hover:bg-gray-700 active:scale-95 transition-all tpl-step-down">-</button>
              <div class="text-white font-bold text-sm"><span class="tpl-stepper-value">8</span><span class="text-[10px] text-gray-500 ml-1 tpl-stepper-unit">hrs</span></div>
              <button class="w-8 h-8 flex items-center justify-center bg-cardbg rounded-md text-gray-400 hover:text-white hover:bg-gray-700 active:scale-95 transition-all tpl-step-up">+</button>
            </div>
          </div>
        </div>
      </div>
    </template>
    <template id="tpl-empty-splash">
      <div class="flex flex-col items-center justify-center text-center w-full h-full bg-deepbg z-[300] absolute inset-0 px-6">
        <div class="w-24 h-24 bg-aqua/10 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(0,242,254,0.15)]">
          <span class="text-6xl">🌊</span>
        </div>
        <h1 class="text-3xl font-bold text-white mb-3 tracking-wide">No Devices Linked</h1>
        <p class="text-gray-500 text-sm mb-10 max-w-xs leading-relaxed">Start your automated aquatic journey by pairing your first AquaSync controller.</p>
        <button id="btn-start-discovery" class="w-full max-w-[280px] bg-aqua text-black font-bold py-4 rounded-2xl uppercase tracking-widest text-sm transition-all active:scale-95 shadow-[0_0_20px_rgba(0,242,254,0.3)]">
          Discover Devices
        </button>
      </div>
    </template>

    <template id="tpl-pairing-wizard">
      <div class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-[400] px-4 animate-fade-in">
        <div class="bg-cardbg rounded-3xl p-6 shadow-2xl border border-gray-800 w-full max-w-sm relative overflow-hidden flex flex-col">
          
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-sm uppercase text-white font-bold tracking-wider">Wi-Fi Setup</h2>
            <button id="btn-close-wizard" class="text-gray-500 hover:text-red-400 text-2xl leading-none transition-colors">&times;</button>
          </div>

          <div id="view-listen" class="space-y-6">
            <div class="bg-[#121212] p-5 rounded-xl border border-gray-800 text-left">
              <ol class="text-xs text-gray-400 space-y-4 list-decimal list-inside marker:text-aqua marker:font-bold">
                <li>Open your phone's <span class="font-bold text-white">Wi-Fi Settings</span>.</li>
                <li>Connect to the network named: <br />
                  <div class="bg-cardbg border border-gray-700 px-3 py-2 rounded-lg mt-2 flex items-center justify-between shadow-inner">
                    <span class="font-mono text-aqua font-bold tracking-wider">AquaControl_setup</span>
                  </div>
                </li>
                <li>Return to this app.</li>
              </ol>
            </div>
            <div class="flex flex-col items-center justify-center space-y-3 pt-4">
              <span class="text-3xl animate-pulse">📡</span>
              <p class="text-[10px] text-aqua text-center uppercase tracking-widest animate-pulse">Listening for device...</p>
            </div>
          </div>

          <div id="view-found" class="hidden space-y-5">
            <div class="bg-aqua/10 border border-aqua/50 rounded-2xl p-4 text-center shadow-[0_0_15px_rgba(0,242,254,0.1)]">
              <span class="text-3xl mb-2 block drop-shadow-md">🐠</span>
              <h3 class="text-white font-bold text-sm tracking-wide">Controller Found!</h3>
              <p id="txt-found-hwid" class="text-[10px] text-aqua uppercase tracking-widest mt-1 font-mono">HW_ID: ----</p>
            </div>
            <div class="space-y-4">
              <div>
                <label class="block text-[10px] text-gray-400 uppercase tracking-wider mb-2 ml-1">Home Wi-Fi Name (SSID)</label>
                <input type="text" id="inp-ssid" placeholder="e.g. Home_Network_2.4G" class="w-full bg-[#121212] border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-aqua transition-colors text-sm" />
              </div>
              <div>
                <label class="block text-[10px] text-gray-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                <input type="password" id="inp-pass" placeholder="Enter password" class="w-full bg-[#121212] border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-aqua transition-colors text-sm" />
              </div>
              <div>
                <label class="block text-[10px] text-gray-400 uppercase tracking-wider mb-2 ml-1">Device Name</label>
                <input type="text" id="inp-name" placeholder="e.g., Living Room Tank" class="w-full bg-[#121212] border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-aqua transition-colors text-sm" />
              </div>
            </div>
            <button id="btn-send-creds" class="w-full bg-aqua text-black font-bold py-4 rounded-xl uppercase tracking-widest text-xs transition-all active:scale-95 shadow-[0_0_15px_rgba(0,242,254,0.2)] mt-2">
              Pair Device
            </button>
          </div>

        </div>
      </div>
    </template>

    
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
